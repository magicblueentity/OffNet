<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffNet - Offline-First Middleware</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="icon">🌐</span>
                    OffNet
                </h1>
                <p class="subtitle">Control Center</p>
            </div>
            <div class="connection-status" id="connectionStatus">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">Checking...</span>
            </div>
        </header>

        <main class="main">
            <!-- Control Panel -->
            <section class="control-panel">
                <h2>Connection Control</h2>
                <div class="connection-controls">
                    <button id="goOnline" class="btn btn-primary">Go Online</button>
                    <button id="goOffline" class="btn btn-secondary">Go Offline</button>
                    <button id="startSync" class="btn btn-success">Sync Now</button>
                </div>
            </section>

            <!-- Status Dashboard -->
            <section class="dashboard">
                <h2>System Status</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="queueSize">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="cacheSize">0</div>
                        <div class="stat-label">Cached</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="syncedCount">0</div>
                        <div class="stat-label">Synced</div>
                    </div>
                </div>
                <div class="last-sync">
                    <span>Last Sync: </span>
                    <span id="lastSyncTime">Never</span>
                </div>
            </section>

            <!-- Queue Status -->
            <section class="queue-status">
                <h2>Request Queue</h2>
                <div id="queueList" class="queue-list"></div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 OffNet - Advanced Offline-First Middleware</p>
        </footer>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div class="loading-text">Processing...</div>
    </div>

    <!-- Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
